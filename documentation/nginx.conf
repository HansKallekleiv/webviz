user nginx;
daemon off;

worker_processes 1;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
}

error_log  stderr warn;
pid        /tmp/nginx.pid;

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format combined_realip '$http_x_forwarded_for - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';

    access_log /dev/stdout combined_realip;

    server_tokens off;

    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;

    keepalive_timeout  65;

    gzip on;
    gzip_types text/css text/javascript text/plain application/javascript application/json image/svg+xml;
    gzip_min_length 1k;

    server {
        listen 8081 default_server;

        client_max_body_size 1m;

        root /usr/share/nginx/html;
        index index.html;

        location /docs/assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /docs/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /docs/index.html;

            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy "no-referrer";
        }

        location / {
            return 301 /docs/;
        }
    }
}
